<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand System · Workshop</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F2EC;
  --ink:#1A1714;
  --ink2:#6B6760;
  --ink3:#9E9B97;
  --accent:#C8401A;
  --accent2:#E8B84B;
  --card:#FFFFFF;
  --border:#E0DDD6;
}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
}
.site-header{
  border-bottom:1px solid var(--border);
  padding:14px 40px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:var(--bg);
  position:sticky;
  top:0;
  z-index:100;
}
.site-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:.08em;text-transform:uppercase}
.site-logo span{color:var(--accent)}
.header-meta{font-size:12px;color:var(--ink3);display:flex;align-items:center;gap:16px}
.live-badge{display:flex;align-items:center;gap:6px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.main{max-width:860px;margin:0 auto;padding:48px 24px 100px}
.empty-state{text-align:center;padding:80px 24px;color:var(--ink3)}
.empty-state .icon{font-size:40px;margin-bottom:16px}
.empty-state p{font-size:15px;line-height:1.7}
.block{margin-bottom:56px;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section-label{font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:30px;line-height:1.2;color:var(--ink);margin-bottom:12px}
.section-desc{font-size:15px;color:var(--ink2);line-height:1.7;max-width:600px;margin-bottom:28px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:640px){.cards{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:22px}
.card-tag{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;font-weight:500}
.card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;line-height:1.3;color:var(--ink);margin-bottom:10px}
.card-body{font-size:13.5px;color:var(--ink2);line-height:1.7}
.card-body strong{color:var(--ink);font-weight:500}
.divider{border:none;border-top:1px solid var(--border);margin:0 0 48px}
.alert{background:#2A1208;border-radius:10px;padding:22px 26px;margin-bottom:28px}
.alert-tag{display:inline-block;background:var(--accent);color:#fff;font-size:9px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;padding:3px 9px;border-radius:4px;margin-bottom:14px}
.alert-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#fff;line-height:1.6}
.alert-title span{color:var(--accent2)}
.prompt-block{background:#1A1714;border-radius:10px;margin-bottom:28px;overflow:hidden}
.prompt-header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid #2E2B27}
.prompt-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:#6B6760;font-weight:500}
.prompt-copy{font-size:11px;font-weight:500;color:#9E9B97;background:#2A2724;border:none;border-radius:5px;padding:5px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .15s}
.prompt-copy:hover{color:#fff}
.prompt-body{padding:20px;font-family:'Courier New',monospace;font-size:13px;color:#D4D0CA;line-height:1.7;white-space:pre-wrap}
.notice{border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:15px 20px;font-size:13.5px;color:var(--ink2);line-height:1.7}
.texto{font-size:15px;color:var(--ink2);line-height:1.8;max-width:680px}
.footer-bar{position:fixed;bottom:0;left:0;right:0;border-top:1px solid var(--border);background:var(--bg);padding:14px 40px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--ink3);z-index:100}
.footer-warning{color:var(--accent);font-weight:500;letter-spacing:.04em;text-transform:uppercase;font-size:10px}
</style>
</head>
<body>

<header class="site-header">
  <div class="site-logo">Brand<span>System</span></div>
  <div class="header-meta">
    <div class="live-badge">
      <span class="live-dot"></span>
      <span>Ao vivo</span>
    </div>
    <span>Workshop · na ordem certa</span>
  </div>
</header>

<main class="main" id="conteudo">
  <div class="empty-state">
    <div class="icon">⏳</div>
    <p>O conteúdo vai aparecer aqui automaticamente<br>conforme o workshop avançar.</p>
  </div>
</main>

<div class="footer-bar">
  <span>Brand System · Workshop</span>
  <span class="footer-warning">Não compartilhe este link</span>
  <span id="ultimo-update">Aguardando conteúdo...</span>
</div>

<script>
const SUPABASE_URL = 'https://jopjcsadilcgsdadhrfz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ed4KOU0afYspiT_jcGeS9g_hPU8uof_';

let ultimoId = null;

async function buscarBlocos() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/blocos?select=*&order=criado_em.asc`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    const blocos = await res.json();
    if (!Array.isArray(blocos) || blocos.length === 0) return;
    const ultimoBlocoId = blocos[blocos.length - 1].id;
    if (ultimoBlocoId === ultimoId) return;
    ultimoId = ultimoBlocoId;
    renderizarBlocos(blocos);
    const agora = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
    document.getElementById('ultimo-update').textContent = `Atualizado às ${agora}`;
  } catch(e) {
    console.error('Erro:', e);
  }
}

function renderizarBlocos(blocos) {
  const container = document.getElementById('conteudo');
  container.innerHTML = '';
  blocos.forEach((bloco, i) => {
    const div = document.createElement('div');
    div.className = 'block';
    let html = '';
    if (bloco.label) html += `<div class="section-label">${bloco.label}</div>`;
    if (bloco.titulo) html += `<div class="section-title">${bloco.titulo}</div>`;
    if (bloco.descricao) html += `<div class="section-desc">${bloco.descricao}</div>`;

    if (bloco.tipo === 'cards' && bloco.conteudo) {
      const items = Array.isArray(bloco.conteudo) ? bloco.conteudo : (bloco.conteudo.items || []);
      html += '<div class="cards">';
      items.forEach(card => {
        html += `<div class="card">
          ${card.tag ? `<div class="card-tag">${card.tag}</div>` : ''}
          ${card.titulo ? `<div class="card-title">${card.titulo}</div>` : ''}
          ${card.corpo ? `<div class="card-body">${card.corpo}</div>` : ''}
        </div>`;
      });
      html += '</div>';
    }
    if (bloco.tipo === 'alerta' && bloco.conteudo) {
      html += `<div class="alert">
        ${bloco.conteudo.tag ? `<div class="alert-tag">${bloco.conteudo.tag}</div>` : ''}
        <div class="alert-title">${bloco.conteudo.texto || ''}</div>
      </div>`;
    }
    if (bloco.tipo === 'prompt' && bloco.conteudo) {
      html += `<div class="prompt-block">
        <div class="prompt-header">
          <span class="prompt-label">${bloco.conteudo.label || 'Prompt'}</span>
          <button class="prompt-copy" onclick="copiar(this)">Copiar</button>
        </div>
        <div class="prompt-body">${bloco.conteudo.texto || ''}</div>
      </div>`;
    }
    if (bloco.tipo === 'aviso' && bloco.conteudo) {
      html += `<div class="notice">${bloco.conteudo.texto || ''}</div>`;
    }
    if (bloco.tipo === 'texto' && bloco.conteudo) {
      html += `<div class="texto">${bloco.conteudo.texto || ''}</div>`;
    }

    div.innerHTML = html;
    container.appendChild(div);
    if (i < blocos.length - 1) {
      const hr = document.createElement('hr');
      hr.className = 'divider';
      container.appendChild(hr);
    }
  });
}

function copiar(btn) {
  const texto = btn.closest('.prompt-block').querySelector('.prompt-body').innerText;
  navigator.clipboard.writeText(texto).then(() => {
    btn.textContent = 'Copiado!';
    setTimeout(() => btn.textContent = 'Copiar', 2000);
  });
}

buscarBlocos();
setInterval(buscarBlocos, 10000);
</script>
</body>
</html>
